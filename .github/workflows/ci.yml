name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # lp10 ships for macOS, so macos-latest is the canonical target. Linux is
    # cheap and fast and nothing here is darwin-only (no GOOS build tags,
    # security(1) is stubbed in the askpass test, the device shell loop is
    # POSIX-clean, and ptys / TIOCGWINSZ exist on Linux too), so we test both.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
